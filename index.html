<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Presentasi Lembaga Sosial</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
    background:black;
    color:white;
}

/* BACKGROUND */

.bg{
    position:fixed;
    inset:0;
    z-index:-3;

    background:
    radial-gradient(circle at top left,#ff8800 0%,transparent 30%),
    radial-gradient(circle at bottom right,#ff6600 0%,transparent 30%),
    linear-gradient(135deg,#000,#111,#ff5e00);
}

/* GRID */

.grid{
    position:absolute;
    inset:0;

    background:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);

    background-size:60px 60px;

    animation:gridMove 10s linear infinite;
}

/* PARTICLES */

.particles{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.particles span{
    position:absolute;
    border-radius:50%;
    background:orange;
    box-shadow:0 0 20px orange;

    animation:particleMove linear infinite;
}

/* SLIDES */

.slide{
    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    transition:1s;
}

/* INTRO */

.icons{
    display:flex;
    gap:35px;
    margin-bottom:40px;
}

.icons div{
    font-size:70px;
    animation:float 3s ease-in-out infinite;
}

.icons div:nth-child(2){
    animation-delay:.5s;
}

.icons div:nth-child(3){
    animation-delay:1s;
}

.icons div:nth-child(4){
    animation-delay:1.5s;
}

.title{
    font-size:90px;
    font-weight:800;
    text-align:center;

    text-shadow:
    0 0 15px orange,
    0 0 40px orange;

    animation:zoomIn 2s ease;
}

.subtitle{
    margin-top:20px;
    font-size:28px;
    color:#ffd8a8;
}

.start-btn{
    margin-top:50px;

    padding:16px 45px;

    border:none;
    border-radius:50px;

    background:linear-gradient(135deg,#ff9500,#ff5e00);

    color:white;
    font-size:18px;
    font-weight:700;

    cursor:pointer;

    box-shadow:0 0 20px orange;

    transition:.4s;
}

.start-btn:hover{
    transform:scale(1.08);
}

/* SLIDE 2 */

#slide2{
    transform:translateX(100%);
}

.team-title{
    font-size:60px;
    margin-bottom:50px;

    text-shadow:0 0 20px orange;
}

.cards{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
    justify-content:center;
}

/* CARD */

.card{
    width:300px;

    background:rgba(255,255,255,.08);

    border:2px solid rgba(255,165,0,.4);

    backdrop-filter:blur(12px);

    border-radius:30px;

    padding:25px;

    text-align:center;

    position:relative;

    overflow:hidden;

    transition:.5s;

    box-shadow:
    0 0 25px rgba(255,140,0,.4);
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
}

.card::before{
    content:'';

    position:absolute;
    inset:-2px;

    background:linear-gradient(
    45deg,
    transparent,
    rgba(255,165,0,.5),
    transparent
    );

    animation:shine 3s linear infinite;
}

/* LEADER */

.leader{
    border:2px solid gold;

    box-shadow:
    0 0 40px gold;
}

/* PROFILE IMAGE */

.profile-img{
    width:170px;
    height:170px;

    border-radius:50%;

    object-fit:cover;

    border:4px solid orange;

    box-shadow:
    0 0 25px orange;

    margin-bottom:20px;

    position:relative;
    z-index:2;

    animation:float 4s ease-in-out infinite;
}

/* NAME */

.name{
    font-size:28px;
    font-weight:700;

    position:relative;
    z-index:2;
}

/* ROLE */

.role{
    margin-top:12px;

    color:#ffb347;

    font-size:18px;

    position:relative;
    z-index:2;
}

/* ANIMATIONS */

@keyframes zoomIn{
    from{
        transform:scale(.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

@keyframes particleMove{
    from{
        transform:translateY(100vh) scale(0);
        opacity:0;
    }
    to{
        transform:translateY(-10vh) scale(1);
        opacity:1;
    }
}

@keyframes gridMove{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(60px);
    }
}

@keyframes shine{
    from{
        transform:translateX(-100%);
    }
    to{
        transform:translateX(100%);
    }
}

/* MOBILE */

@media(max-width:900px){

    .title{
        font-size:55px;
    }

    .team-title{
        font-size:40px;
    }

    .cards{
        flex-direction:column;
        align-items:center;
    }
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="grid"></div>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- SLIDE 1 -->

<section class="slide" id="slide1">

    <div class="icons">
        <div>🏫</div>
        <div>👨‍👩‍👧</div>
        <div>⛪</div>
        <div>🤝</div>
    </div>

    <div class="title">
        LEMBAGA SOSIAL
    </div>

    <div class="subtitle">
        Presentasi Kelompok IPAS
    </div>

    <button class="start-btn" onclick="nextSlide()">
        MULAI PRESENTASI
    </button>

</section>

<!-- SLIDE 2 -->

<section class="slide" id="slide2">

    <div class="team-title">
        PERKENALAN KELOMPOK
    </div>

    <div class="cards">

        <!-- NAYLA -->

        <div class="card leader">

            <img src="images/nayla.jpeg" alt="Nayla Kanya Putri" class="profile-img">

            <div class="name">
                Nayla Kanya Putri
            </div>

            <div class="role">
                Leader
            </div>

        </div>

        <!-- YOHANES -->

        <div class="card">

            <img src="images/yohanes.jpeg" alt="Yohanes Martin Anugrah Sitorus" class="profile-img">

            <div class="name">
                Yohanes Martin
                Anugrah Sitorus
            </div>

            <div class="role">
                Anggota
            </div>

        </div>

        <!-- MUHAMMAD -->

        <div class="card">

            <img src="images/prazaki.jpeg" alt="Muhammad Putera Prazaki" class="profile-img">

            <div class="name">
                Muhammad Putera
                Prazaki
            </div>

            <div class="role">
                Anggota
            </div>

        </div>

    </div>

</section>

<script>

/* PARTICLES */

const particles = document.getElementById("particles");

for(let i=0;i<60;i++){

    const span = document.createElement("span");

    let size = Math.random()*8 + 4;

    span.style.width = size + "px";
    span.style.height = size + "px";

    span.style.left = Math.random()*100 + "%";

    span.style.animationDuration =
    (Math.random()*10 + 5) + "s";

    span.style.animationDelay =
    Math.random()*5 + "s";

    particles.appendChild(span);
}

/* NEXT SLIDE */

function nextSlide(){

    document.getElementById("slide1")
    .style.transform = "translateX(-100%)";

    document.getElementById("slide2")
    .style.transform = "translateX(0)";
}

</script>

</body>
</html>
